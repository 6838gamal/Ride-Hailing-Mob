name: ride_hailing
description: A premium ride-hailing app with rich motion design and modern UX.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2

  # Maps (OpenStreetMap — no API key required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.3
  rive: ^0.13.16

  # Typography
  google_fonts: ^6.2.1

  # UI Components
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  pin_code_fields: ^8.0.1

  # Location & Permissions
  geolocator: ^13.0.4
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
